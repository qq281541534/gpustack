# ============================================================
# Nginx 配置：llm.lmzjai.com → GPUStack Docker Compose (8080)
# ============================================================
# 快速启动（首次部署）：
#   1. 生成临时自签名证书（让 Nginx 先能启动）
#      mkdir -p /etc/nginx/ssl
#      openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#        -keyout /etc/nginx/ssl/llm.lmzjai.com.key \
#        -out /etc/nginx/ssl/llm.lmzjai.com.crt \
#        -subj "/CN=llm.lmzjai.com"
#
#   2. 复制配置并启动 Nginx
#      cp lmzj-docs/nginx-llm.lmzjai.com.conf /etc/nginx/conf.d/
#      cp lmzj-docs/proxy.conf /etc/nginx/
#      nginx -t && systemctl reload nginx
#
#   3. 申请正式证书（Let's Encrypt）
#      certbot --nginx -d llm.lmzjai.com
#      # certbot 会自动修改配置中的证书路径
#
# 注意：
#   - GPUStack SSO 回调地址需配置为 https://llm.lmzjai.com/auth/oidc/callback
#   - Docker Compose 端口映射：8080:80
# ============================================================

server {
    listen 80;
    server_name llm.lmzjai.com;

    # HTTP 自动跳转 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # ACME 挑战（Let's Encrypt 证书续期）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name llm.lmzjai.com;

    # 上传大小限制（模型文件上传可能需要较大体积）
    client_max_body_size 10G;
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # 日志
    access_log /var/log/nginx/llm.lmzjai.com.access.log;
    error_log /var/log/nginx/llm.lmzjai.com.error.log;

    # WebSocket 支持（GPUStack 实时日志等功能需要）
    location /ws/ {
        proxy_pass http://127.0.0.1:8080;
        include proxy.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }

    # 静态资源缓存优化
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8080;
        include proxy.conf;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 兜底：所有请求代理到 GPUStack
    location / {
        proxy_pass http://127.0.0.1:8080;
        include proxy.conf;
    }

    # SSL 证书路径（首次部署先用自签名，certbot 申请后会自动替换）
    ssl_certificate /etc/nginx/ssl/llm.lmzjai.com.crt;
    ssl_certificate_key /etc/nginx/ssl/llm.lmzjai.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
}
