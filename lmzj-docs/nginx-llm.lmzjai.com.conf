# ============================================================
# Nginx 配置：llm.lmzjai.com → GPUStack Docker Compose (8080)
# ============================================================
# 部署说明：
#   1. 将此文件复制到 /etc/nginx/sites-available/llm.lmzjai.com
#   2. ln -s /etc/nginx/sites-available/llm.lmzjai.com /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx
#   4. 确保 SSL 证书已申请（Let's Encrypt / certbot）
#
# 注意：
#   - GPUStack SSO 回调地址需配置为 https://llm.lmzjai.com/auth/oidc/callback
#   - Docker Compose 端口映射：8080:80
# ============================================================

server {
    listen 80;
    server_name llm.lmzjai.com;

    # HTTP 自动跳转 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }

    # ACME 挑战（Let's Encrypt 证书续期）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl http2;
    server_name llm.lmzjai.com;

    # SSL 证书路径（请根据实际情况修改）
    ssl_certificate /etc/letsencrypt/live/llm.lmzjai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.lmzjai.com/privkey.pem;

    # SSL 优化配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 上传大小限制（模型文件上传可能需要较大体积）
    client_max_body_size 10G;
    client_body_timeout 600s;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # 日志
    access_log /var/log/nginx/llm.lmzjai.com.access.log;
    error_log /var/log/nginx/llm.lmzjai.com.error.log;

    # 反向代理到 GPUStack Docker Compose（端口 8080）
    location / {
        proxy_pass http://127.0.0.1:8080;

        # 转发真实客户端信息
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket 支持（GPUStack 实时日志等功能需要）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 缓冲区优化
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # 静态资源缓存优化（可选）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
