name: Build Immutable GPUStack Image

on:
  push:
    branches:
      - dev
    paths-ignore:
      - "mkdocs.yml"
      - "docs/**"
      - "**.md"
      - "**.mdx"
      - "**.png"
      - "**.jpg"
      - "**.gif"
  workflow_dispatch:
    inputs:
      backend_sha:
        description: "Full 40-character backend commit SHA from dev"
        required: true
      frontend_ref:
        description: "Frontend repository branch, tag, or full SHA"
        required: true
        default: "dev"
      push_image:
        description: "Push image to registry"
        type: boolean
        required: true
        default: true

permissions:
  contents: read
  pull-requests: read
  packages: write

env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY || 'registry.cn-chengdu.aliyuncs.com' }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE || 'lmzjai' }}
  ACR_REPOSITORY: ${{ vars.ACR_REPOSITORY || 'gpustack-custom' }}
  FRONTEND_REPOSITORY: ${{ vars.FRONTEND_REPOSITORY || 'qq281541534/gpustack-ui' }}

jobs:
  build-image:
    name: Build immutable image
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Resolve release SHA
        id: release
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            sha="${{ github.event.inputs.backend_sha }}"
          else
            sha="${GITHUB_SHA}"
          fi
          if [[ ! "${sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "backend_sha must be a full 40-character lowercase git SHA." >&2
            exit 1
          fi
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout GPUStack Backend
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.sha }}
          fetch-depth: 0

      - name: Confirm SHA belongs to dev
        run: |
          set -euo pipefail
          git fetch origin dev
          git merge-base --is-ancestor "${{ steps.release.outputs.sha }}" origin/dev

      - name: Verify image build source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/verify_image_build_source.py --sha "${{ steps.release.outputs.sha }}" --base-branch dev

      - name: Checkout GPUStack UI
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          ref: ${{ github.event.inputs.frontend_ref || 'dev' }}
          path: gpustack-ui

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: gpustack-ui/pnpm-lock.yaml

      - name: Build Frontend
        run: |
          set -euo pipefail
          cd gpustack-ui
          pnpm install --frozen-lockfile
          pnpm build

      - name: Copy Frontend to Backend
        run: |
          set -euo pipefail
          rm -rf gpustack/ui
          mkdir -p gpustack/ui
          cp -r gpustack-ui/dist/* gpustack/ui/

      - name: Setup Docker Buildx
        id: setup-buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            env.BUILDKIT_STEP_LOG_MAX_SIZE=-1
            env.BUILDKIT_STEP_LOG_MAX_SPEED=-1

      - name: Setup BuildKit Cache Mounts
        id: setup-buildkit-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.cache/buildkit
          key: buildkit-cache-mount-${{ runner.os }}-${{ hashFiles('uv.lock', 'pack/Dockerfile') }}
          restore-keys: |
            buildkit-cache-mount-${{ runner.os }}-

      - name: Restore BuildKit Cache Mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          cache-dir: ${{ github.workspace }}/.cache/buildkit
          dockerfile: ${{ github.workspace }}/pack/Dockerfile
          skip-extraction: ${{ steps.setup-buildkit-cache.outputs.cache-hit }}

      - name: Login to Aliyun ACR
        if: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.ACR_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.release.outputs.sha }}
          labels: |
            org.opencontainers.image.revision=${{ steps.release.outputs.sha }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: pack/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UI_DOWNLOAD=true
            VERSION=v0.0.0
            GIT_COMMIT=${{ steps.release.outputs.sha }}
          cache-from: type=gha,scope=gpustack-image-linux-amd64
          cache-to: type=gha,mode=max,scope=gpustack-image-linux-amd64
